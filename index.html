
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Garir Dokan Pro - Automotive Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        background-color: #0a0a0b;
        margin: 0;
        overflow-x: hidden;
      }

      /* A4 Preview Styles */
      .a4-page {
        width: 210mm;
        min-height: 297mm;
        margin: 10px auto;
        background: white;
        box-shadow: 0 0 50px rgba(0,0,0,0.5);
        box-sizing: border-box;
      }
      @media print {
        @page {
          size: auto;
          margin: 0mm;
        }
        
        /* Hide all sibling elements of the modal and unwanted items */
        .no-print, .print\:hidden, nav, button, input, select, textarea, footer {
          display: none !important;
        }
        
        html, body {
          background-color: #ffffff !important;
          background: #ffffff !important;
          color: #000000 !important;
          margin: 0 !important;
          padding: 0 !important;
          width: 210mm !important;
          height: auto !important;
          min-height: 297mm !important;
          overflow: visible !important;
          position: relative !important;
          -webkit-print-color-adjust: exact !important;
          print-color-adjust: exact !important;
        }

        #root {
          display: block !important;
          margin: 0 !important;
          padding: 0 !important;
          width: 100% !important;
          height: auto !important;
        }

        /* Hide everything inside #root except the modal container */
        #root > *:not(.print-modal-container) {
          display: none !important;
        }

        .print-modal-container {
          display: block !important;
          position: absolute !important;
          left: 0 !important;
          top: 0 !important;
          width: 210mm !important;
          height: auto !important;
          min-height: 297mm !important;
          background: transparent !important;
          backdrop-filter: none !important;
          padding: 0 !important;
          margin: 0 !important;
          overflow: visible !important;
          z-index: auto !important;
        }

        /* Hide top preview control bar inside modal container */
        .print-modal-container > *:not(.print-scroll-container) {
          display: none !important;
        }

        .print-scroll-container {
          display: block !important;
          position: static !important;
          width: 210mm !important;
          height: auto !important;
          min-height: 297mm !important;
          padding: 0 !important;
          margin: 0 !important;
          background: transparent !important;
          overflow: visible !important;
          box-sizing: border-box !important;
        }

        .print-scale-reset {
          display: block !important;
          position: static !important;
          width: 210mm !important;
          height: auto !important;
          min-height: 297mm !important;
          transform: none !important;
          scale: none !important;
          margin: 0 !important;
          padding: 0 !important;
          background: transparent !important;
          box-shadow: none !important;
          border: none !important;
        }

        .print-doc-preview-wrapper {
          display: block !important;
          position: static !important;
          padding: 0 !important;
          margin: 0 !important;
          background: transparent !important;
          width: 210mm !important;
          height: auto !important;
          min-height: 297mm !important;
          overflow: visible !important;
        }

        .a4-page {
          display: block !important;
          position: relative !important;
          margin: 0 !important;
          padding: 0 !important;
          box-shadow: none !important;
          border: none !important;
          transform: none !important;
          width: 210mm !important;
          min-height: 297mm !important;
          max-height: 297mm !important;
          page-break-inside: avoid !important;
          page-break-after: avoid !important;
          page-break-before: avoid !important;
          background: #ffffff !important;
          color: #000000 !important;
        }
      }
      
      /* Smooth scrolling */
      html {
        scroll-behavior: smooth;
      }

      /* Hide scrollbar for Chrome, Safari and Opera */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #ef4444; /* red-500 */
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #b91c1c; /* red-700 */
      }

      /* Transitions */
      .animate-in {
        animation: fadeIn 0.5s ease-out;
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .zoom-in {
        animation: zoomIn 0.3s ease-out;
      }
      @keyframes zoomIn {
        from { opacity: 0; transform: scale(0.95); }
        to { opacity: 1; transform: scale(1); }
      }
    </style>

  }
}
</script>

</head>

</html>
